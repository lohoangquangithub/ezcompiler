<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EZCompiler Pro</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { margin: 0; background: #0b0f19; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { padding: 15px; background: #1a202c; display: flex; gap: 10px; align-items: center; border-bottom: 2px solid #2d3748; }
        textarea { width: 100%; height: 40%; background: #121212; color: #fff; padding: 15px; border: none; font-family: 'Consolas', monospace; resize: none; outline: none; }
        #output { background: #090d16; color: #4ade80; padding: 15px; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-family: 'Consolas', monospace; }
        button { padding: 8px 20px; background: #00c853; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #00e676; }
        select { padding: 8px; background: #2d3748; color: white; border: 1px solid #4a5568; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <select id="lang">
        <option value="cpp">C++</option>
        <option value="c">C</option>
        <option value="python">Python</option>
        <option value="js">JavaScript</option>
    </select>
    <button onclick="runCode()">Chạy Code ▶</button>
</div>

<textarea id="code" spellcheck="false">#include <iostream>
int main() { std::cout << "Hello C++"; return 0; }</textarea>

<div id="output">Đang khởi tạo trình biên dịch...</div>

<script>
    let pyodide = null;
    const output = document.getElementById('output');

    // Khởi tạo Pyodide
    async function init() {
        pyodide = await loadPyodide();
        output.innerText = "Sẵn sàng!";
    }
    init();

    async function runCode() {
        const lang = document.getElementById('lang').value;
        const code = document.getElementById('code').value;
        output.innerText = "Đang xử lý...";

        try {
            // 1. Xử lý C/C++ bằng API Wandbox
            if (lang === 'cpp' || lang === 'c') {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        compiler: 'gcc-head',
                        code: code,
                        save: false
                    })
                });
                const data = await response.json();
                output.innerText = data.compiler_error || data.program_error || data.program_output || "Hoàn thành.";
            } 
            
            // 2. Xử lý Python bằng Pyodide (Client-side)
            else if (lang === 'python') {
                try {
                    let result = await pyodide.runPythonAsync(code);
                    output.innerText = (result !== undefined) ? result : "Đã thực thi Python thành công.";
                } catch (e) {
                    output.innerText = "Lỗi Python: " + e.message;
                }
            }

            // 3. Xử lý JS bằng engine trình duyệt (Native)
            else if (lang === 'js') {
                let logs = [];
                const oldLog = console.log;
                console.log = (...args) => logs.push(args.join(" "));
                try {
                    eval(code);
                    output.innerText = logs.length > 0 ? logs.join("\n") : "Đã thực thi JS thành công.";
                } catch (e) {
                    output.innerText = "Lỗi JS: " + e.message;
                } finally {
                    console.log = oldLog;
                }
            }
        } catch (e) {
            output.innerText = "Lỗi kết nối hoặc thực thi: " + e.message;
        }
    }
</script>
</body>
</html>
