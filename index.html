<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZCompiler Pro</title>
    <style>
        body { margin: 0; background: #0b0f19; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1a202c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2d3748; }
        .logo { font-size: 20px; font-weight: bold; color: #48bb78; }
        .controls { display: flex; gap: 10px; align-items: center; }
        select { padding: 8px; background: #2d3748; color: white; border: 1px solid #4a5568; border-radius: 4px; cursor: pointer; }
        button { padding: 8px 20px; background: #00c853; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00e676; }
        .main { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; background: #121212; border: 1px solid #2d3748; border-radius: 6px; }
        .title { padding: 10px; background: #1a202c; font-size: 12px; color: #a0aec0; text-transform: uppercase; border-bottom: 1px solid #2d3748; }
        textarea, #output { flex: 1; width: 100%; box-sizing: border-box; background: #090d16; color: #38bdf8; border: none; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; outline: none; resize: none; overflow: auto; }
        #output { color: #4ade80; white-space: pre-wrap; }
        .error { color: #f87171 !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">⚡ EZCompiler</div>
    <div class="controls">
        <select id="language" onchange="loadTemplate()">
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="java">Java</option>
            <option value="python">Python 3</option>
            <option value="js">JavaScript</option>
        </select>
        <button onclick="runCode()">Chạy Code ▶</button>
    </div>
</header>

<div class="main">
    <div class="panel">
        <div class="title">Mã nguồn</div>
        <textarea id="code" spellcheck="false"></textarea>
    </div>
    <div class="panel">
        <div class="title">Kết quả</div>
        <div id="output">Nhấn "Chạy Code ▶" để bắt đầu...</div>
    </div>
</div>

<script>
    const templates = {
        'cpp': '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Xin chào C++!" << endl;\n    return 0;\n}',
        'c': '#include <stdio.h>\n\nint main() {\n    printf("Xin chào C!\\n");\n    return 0;\n}',
        'java': 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Xin chào Java!");\n    }\n}',
        'python': 'print("Xin chào Python!")',
        'js': 'console.log("Xin chào JavaScript!");'
    };

    const compilerMap = {
        'cpp': 'gcc-head',
        'c': 'gcc-head',
        'java': 'openjdk-head',
        'python': 'cpython-head',
        'js': 'nodejs-head'
    };

    function loadTemplate() {
        const lang = document.getElementById('language').value;
        document.getElementById('code').value = templates[lang];
    }

    async function runCode() {
        const outputDiv = document.getElementById('output');
        const code = document.getElementById('code').value;
        const lang = document.getElementById('language').value;

        outputDiv.innerText = "Đang biên dịch...";
        outputDiv.classList.remove('error');

        try {
            const response = await fetch('https://wandbox.org/api/compile.json', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    compiler: compilerMap[lang],
                    code: code,
                    save: false
                })
            });

            const result = await response.json();

            if (result.compiler_error) {
                outputDiv.classList.add('error');
                outputDiv.innerText = "Lỗi biên dịch:\n" + result.compiler_error;
            } else if (result.program_error) {
                outputDiv.classList.add('error');
                outputDiv.innerText = "Lỗi thực thi:\n" + result.program_error;
            } else {
                outputDiv.innerText = result.program_output || "Chương trình thực thi thành công (không có output).";
            }
        } catch (err) {
            outputDiv.classList.add('error');
            outputDiv.innerText = "Lỗi kết nối: Không thể kết nối tới máy chủ biên dịch.";
        }
    }

    loadTemplate();
</script>

</body>
</html>
