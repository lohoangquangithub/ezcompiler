<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EZCompiler | Integrated IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/6.65.7/mode/javascript/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --accent: #00c853; --border: #333; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header & Layout */
        .header { padding: 10px 20px; background: var(--panel); display: flex; gap: 15px; align-items: center; border-bottom: 1px solid var(--border); }
        .main { display: flex; flex-grow: 1; overflow: hidden; position: relative; }
        .panel { display: flex; flex-direction: column; width: 50%; padding: 10px; border-right: 1px solid var(--border); }
        .io-container { width: 50%; display: flex; flex-direction: column; padding: 10px; gap: 5px; }
        
        /* Editor & IO */
        .editor-container { flex-grow: 1; border: 1px solid var(--border); }
        .CodeMirror { height: 100% !important; font-size: 14px; }
        textarea#stdin { height: 150px; background: #121212; color: #fff; border: 1px solid var(--border); padding: 10px; resize: none; font-family: monospace; }
        #output { background: #000; color: #4ade80; padding: 15px; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-family: monospace; border: 1px solid var(--border); }
        
        /* UI Elements */
        button { padding: 8px 20px; background: var(--accent); border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; justify-content: center; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader" class="overlay">Đang xử lý dữ liệu...</div>

<div class="header">
    <select id="lang" onchange="updateMode()">
        <option value="cpp">C++</option>
        <option value="c">C</option>
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
    </select>
    <button id="runBtn" onclick="runCode()">Chạy Code ▶</button>
    <span id="status">Sẵn sàng</span>
</div>

<div class="main">
    <div class="panel">
        <div class="editor-container" id="editor"></div>
    </div>
    <div class="io-container">
        <label><strong>Input (stdin):</strong></label>
        <textarea id="stdin" placeholder="Nhập dữ liệu đầu vào..."></textarea>
        <label><strong>Output:</strong></label>
        <div id="output">Kết quả sẽ hiện ở đây...</div>
    </div>
</div>

<script>
    let pyodide = null;
    let saveTimer;
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');
    const loader = document.getElementById('loader');

    // 1. Khởi tạo Editor
    let editor = CodeMirror(document.getElementById("editor"), {
        value: localStorage.getItem('code') || "// Viết code tại đây",
        mode: "text/x-c++src",
        theme: "monokai",
        lineNumbers: true
    });

    // 2. Debounce LocalStorage (Tối ưu performance)
    editor.on('change', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            localStorage.setItem('code', editor.getValue());
            status.innerText = "Đã lưu tự động";
        }, 1000);
    });

    async function init() {
        pyodide = await loadPyodide();
        status.innerText = "Python đã sẵn sàng.";
    }
    init();

    function updateMode() {
        const lang = document.getElementById('lang').value;
        const modes = { cpp: "text/x-c++src", c: "text/x-csrc", python: "python", javascript: "javascript" };
        editor.setOption("mode", modes[lang]);
    }

    // 3. Error Parsing (Làm sạch log)
    function formatError(errorMsg) {
        if (!errorMsg) return "Không rõ lỗi.";
        return errorMsg.replace(/\/tmp\/.*\.cpp:/g, "Lỗi tại dòng: ");
    }

    // 4. Logic chạy code (Overlay + Async Control)
    async function runCode() {
        const lang = document.getElementById('lang').value;
        const code = editor.getValue();
        const input = document.getElementById('stdin').value;
        
        loader.style.display = 'flex';
        runBtn.disabled = true;
        output.innerText = "";
        status.innerText = "Đang chạy...";

        try {
            if (lang === 'cpp' || lang === 'c') {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ compiler: 'gcc-head', code: code, stdin: input, save: false })
                });
                const data = await response.json();
                output.innerText = formatError(data.compiler_error || data.program_error || data.program_output || "Hoàn thành.");
            } 
            else if (lang === 'python') {
                await pyodide.runPythonAsync(`
                    import sys, io
                    sys.stdin = io.StringIO("""${input.replace(/"/g, '\\"')}""")
                    sys.stdout = io.StringIO()
                `);
                try {
                    await pyodide.runPythonAsync(code);
                    output.innerText = await pyodide.runPythonAsync("sys.stdout.getvalue()");
                } catch (e) {
                    output.innerText = "Lỗi Python: " + e.message;
                }
            }
            else if (lang === 'javascript') {
                let logs = [];
                const oldLog = console.log;
                console.log = (...args) => logs.push(args.join(" "));
                try {
                    eval(code);
                    output.innerText = logs.length > 0 ? logs.join("\n") : "Thực thi thành công.";
                } catch (e) {
                    output.innerText = "Lỗi JS: " + e.message;
                } finally {
                    console.log = oldLog;
                }
            }
        } catch (e) {
            output.innerText = "Lỗi kết nối: " + e.message;
        } finally {
            loader.style.display = 'none';
            runBtn.disabled = false;
            status.innerText = "Sẵn sàng";
        }
    }
</script>
</body>
</html>
