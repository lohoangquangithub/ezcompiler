<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzCompiler</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1e1e1e; 
            color: #cccccc; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        header { 
            background: #252526; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #3c3c3c;
        }
        header h2 {
            margin: 0;
            color: #007acc;
            font-weight: 600;
        }
        .toolbar select {
            padding: 8px 12px; 
            margin-right: 10px; 
            background: #3c3c3c; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 4px; 
            outline: none;
            font-size: 14px;
        }
        .toolbar button { 
            padding: 8px 16px; 
            background: #007acc; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .toolbar button:hover { 
            background: #005999; 
        }
        main { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
        }
        .editor-container, .output-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .editor-container {
            border-right: 1px solid #3c3c3c;
        }
        h3 { 
            margin: 0; 
            padding: 10px 15px; 
            background: #2d2d30; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999999;
        }
        textarea { 
            flex: 1; 
            background: #1e1e1e; 
            color: #d4d4d4; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 15px; 
            padding: 15px; 
            border: none; 
            resize: none; 
            outline: none; 
            line-height: 1.5;
        }
        .output { 
            flex: 1; 
            background: #000000; 
            color: #4af626; 
            font-family: 'Consolas', 'Courier New', monospace; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 14px;
        }
        .error {
            color: #f44336;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <header>
        <h2>EzCompiler</h2>
        <div class="toolbar">
            <select id="language">
                <option value="cpp">C++</option>
                <option value="c">C</option>
                <option value="cs">C#</option>
                <option value="java">Java</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="html">HTML</option>
                <option value="go">Go</option>
                <option value="pascal">Pascal</option>
            </select>
            <button onclick="runCode()">Run Code ▶</button>
        </div>
    </header>
    <main>
        <div class="editor-container">
            <h3>Trình soạn thảo</h3>
            <textarea id="code" spellcheck="false"></textarea>
        </div>
        <div class="output-container">
            <h3>Kết quả</h3>
            <div id="output" class="output"></div>
        </div>
    </main>

    <script>
        const codeInput = document.getElementById('code');
        const outputDiv = document.getElementById('output');
        const langSelect = document.getElementById('language');

        // Mẫu code mặc định cho từng ngôn ngữ
        const templates = {
            'cpp': '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello, C++!";\n    return 0;\n}',
            'c': '#include <stdio.h>\n\nint main() {\n    printf("Hello, C!");\n    return 0;\n}',
            'cs': 'using System;\n\nclass Program {\n    static void Main() {\n        Console.WriteLine("Hello, C#!");\n    }\n}',
            'java': 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello, Java!");\n    }\n}',
            'python': 'print("Hello, Python!")',
            'javascript': 'console.log("Hello, JavaScript!");\n// Bạn có thể viết các hàm logic tại đây',
            'html': '<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    h1 { color: blue; }\n  </style>\n</head>\n<body>\n  <h1>Xin chào từ EzCompiler!</h1>\n  <p>Đây là giao diện web được render trực tiếp.</p>\n</body>\n</html>',
            'go': 'package main\nimport "fmt"\n\nfunc main() {\n    fmt.Println("Hello, Go!")\n}',
            'pascal': 'program Hello;\nbegin\n  writeln(\'Hello, Pascal!\');\nend.'
        };

        // Gán code mẫu khi mở app
        codeInput.value = templates[langSelect.value];

        // Thay đổi code mẫu khi đổi ngôn ngữ
        langSelect.addEventListener('change', (e) => {
            codeInput.value = templates[e.target.value];
            outputDiv.innerHTML = '';
        });

        function runCode() {
            const lang = langSelect.value;
            const code = codeInput.value;
            
            outputDiv.innerHTML = "Đang xử lý...";
            outputDiv.classList.remove('error');
            
            if (lang === 'html') {
                // Render HTML trực tiếp vào iframe
                const iframe = document.createElement('iframe');
                outputDiv.innerHTML = '';
                outputDiv.appendChild(iframe);
                iframe.contentWindow.document.open();
                iframe.contentWindow.document.write(code);
                iframe.contentWindow.document.close();
            } else if (lang === 'javascript') {
                // Chạy JS trực tiếp trên trình duyệt và chặn log để hiển thị
                try {
                    let logOutput = [];
                    const originalLog = console.log;
                    console.log = function(...args) {
                        logOutput.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : a).join(' '));
                    };
                    
                    // Thực thi code
                    eval(code);
                    
                    // Trả lại console mặc định
                    console.log = originalLog;
                    outputDiv.innerHTML = logOutput.join('\\n');
                } catch (err) {
                    outputDiv.innerHTML = `<span class="error">${err}</span>`;
                }
            } else {
                // Mô phỏng yêu cầu gửi lên server cho C++, Java, Python...
                outputDiv.innerHTML = `[HỆ THỐNG] Ngôn ngữ ${lang.toUpperCase()} cần được biên dịch ở phía máy chủ.\n\n`;
                outputDiv.innerHTML += `Để chạy thực tế đoạn mã này, bạn cần gọi API (ví dụ: dùng fetch() gửi mã nguồn lên Judge0 API hoặc Piston API).\n\n`;
                outputDiv.innerHTML += `Mã nguồn bạn vừa viết:\n------------------------\n${code}`;
            }
        }
    </script>
</body>
</html>
