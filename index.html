<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EZCompiler Pro</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #252526;
            --accent-color: #007acc;
            --text-color: #cccccc;
            --border-color: #333333;
        }

        body { 
            margin: 0; 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        .header { 
            padding: 10px 20px; 
            background: var(--panel-bg); 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }

        .container { display: flex; flex-direction: column; flex-grow: 1; padding: 10px; gap: 10px; }

        textarea { 
            width: 100%; 
            height: 45vh; 
            background: #121212; 
            color: #dcdcdc; 
            padding: 15px; 
            border: 1px solid var(--border-color); 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 14px;
            resize: none; 
            outline: none; 
            border-radius: 5px;
        }

        #output { 
            background: #000; 
            color: #4ade80; 
            padding: 15px; 
            flex-grow: 1; 
            border-radius: 5px;
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-family: monospace; 
            border: 1px solid var(--border-color);
        }

        button { 
            padding: 8px 20px; 
            background: var(--accent-color); 
            border: none; 
            color: white; 
            cursor: pointer; 
            font-weight: 600; 
            border-radius: 4px;
            transition: 0.3s;
        }

        button:hover { background: #005f9e; }
        
        select { 
            padding: 8px; 
            background: var(--panel-bg); 
            color: white; 
            border: 1px solid var(--border-color);
            border-radius: 4px; 
        }

        .status { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <strong>EZCompiler</strong>
    <select id="lang">
        <option value="cpp">C++</option>
        <option value="c">C</option>
        <option value="python">Python</option>
        <option value="js">JavaScript</option>
    </select>
    <button onclick="runCode()" id="runBtn">Chạy Code ▶</button>
    <span class="status" id="status">Sẵn sàng</span>
</div>

<div class="container">
    <textarea id="code" spellcheck="false" placeholder="Nhập code của bạn tại đây..."></textarea>
    <div id="output">Kết quả sẽ hiển thị ở đây...</div>
</div>

<script>
    let pyodide = null;
    const output = document.getElementById('output');
    const status = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');

    async function init() {
        pyodide = await loadPyodide();
        status.innerText = "Python đã tải xong";
    }
    init();

    async function runCode() {
        const lang = document.getElementById('lang').value;
        const code = document.getElementById('code').value;
        
        runBtn.disabled = true;
        status.innerText = "Đang chạy...";
        output.innerText = "";

        try {
            if (lang === 'cpp' || lang === 'c') {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ compiler: 'gcc-head', code: code, save: false })
                });
                const data = await response.json();
                output.innerText = data.compiler_error || data.program_error || data.program_output || "Hoàn thành.";
            } 
            else if (lang === 'python') {
                await pyodide.runPythonAsync(`import sys, io; sys.stdout = io.StringIO()`);
                try {
                    await pyodide.runPythonAsync(code);
                    output.innerText = await pyodide.runPythonAsync("sys.stdout.getvalue()");
                } catch (e) {
                    output.innerText = "Lỗi Python: " + e.message;
                } finally {
                    await pyodide.runPythonAsync("sys.stdout = sys.__stdout__");
                }
            }
            else if (lang === 'js') {
                let logs = [];
                const oldLog = console.log;
                console.log = (...args) => logs.push(args.join(" "));
                try {
                    eval(code);
                    output.innerText = logs.length > 0 ? logs.join("\n") : "Đã thực thi thành công.";
                } catch (e) {
                    output.innerText = "Lỗi JS: " + e.message;
                } finally {
                    console.log = oldLog;
                }
            }
        } catch (e) {
            output.innerText = "Lỗi kết nối: " + e.message;
        } finally {
            runBtn.disabled = false;
            status.innerText = "Hoàn thành";
        }
    }
</script>
</body>
</html>
