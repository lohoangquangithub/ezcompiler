<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZCompiler</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0b0f19; 
            color: #c9d1d9; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        header { 
            background: #1a202c; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #2d3748; 
        }
        header h2 { 
            margin: 0; 
            color: #48bb78; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
        }
        header h2 span { color: #f56565; margin-right: 8px; }
        .toolbar { display: flex; align-items: center; gap: 15px; }
        .toolbar label { font-size: 14px; color: #a0aec0; font-weight: 600; }
        .toolbar select { 
            padding: 8px 12px; 
            background: #2d3748; 
            color: #e2e8f0; 
            border: 1px solid #4a5568; 
            border-radius: 4px; 
            outline: none; 
            font-size: 14px; 
        }
        .toolbar button { 
            padding: 8px 16px; 
            background: #00c853; 
            color: #000; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            transition: background 0.2s;
        }
        .toolbar button:hover { background: #00e676; }
        main { display: flex; flex: 1; overflow: hidden; gap: 20px; padding: 20px; }
        .panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #0b0f19; 
            border: 1px solid #2d3748; 
            border-radius: 6px; 
            overflow: hidden; 
        }
        .panel-header { 
            padding: 10px 15px; 
            background: #1a202c; 
            font-size: 12px; 
            color: #a0aec0; 
            text-transform: uppercase; 
            border-bottom: 1px solid #2d3748; 
            letter-spacing: 1px;
        }
        textarea { 
            flex: 1; 
            background: #0b0f19; 
            color: #63b3ed; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 15px; 
            padding: 15px; 
            border: none; 
            resize: none; 
            outline: none; 
            line-height: 1.5; 
        }
        .output { 
            flex: 1; 
            background: #0b0f19; 
            color: #e2e8f0; 
            font-family: 'Consolas', 'Courier New', monospace; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-size: 14px; 
        }
        .error { color: #fc8181; }
        .success { color: #68d391; }
    </style>
</head>
<body>
    <header>
        <h2><span>⚡</span> EZCompiler</h2>
        <div class="toolbar">
            <label for="language">Ngôn ngữ:</label>
            <select id="language">
                <option value="54">C++ (GCC 9.2.0)</option>
                <option value="50">C (GCC 9.2.0)</option>
                <option value="51">C# (Mono 6.6.0)</option>
                <option value="62">Java (OpenJDK 13)</option>
                <option value="71">Python (3.8.1)</option>
                <option value="63">JavaScript (Node.js 12.14)</option>
                <option value="60">Go (1.13.5)</option>
                <option value="67">Pascal (FPC 3.0.4)</option>
            </select>
            <button onclick="runCode()">Chạy Code ▶</button>
        </div>
    </header>
    <main>
        <div class="panel">
            <div class="panel-header">Trình soạn thảo mã nguồn</div>
            <textarea id="code" spellcheck="false">
#include <iostream>
using namespace std;

int main() {
    cout << "Xin chào từ EZCompiler!" << endl;
    int a = 5, b = 10;
    cout << "Tong la: " << a + b << endl;
    return 0;
}</textarea>
        </div>
        <div class="panel">
            <div class="panel-header">Kết quả (Output)</div>
            <div id="output" class="output"></div>
        </div>
    </main>

    <script>
        // 1. Hàm mã hóa Unicode sang Base64 an toàn (Sửa lỗi 'btoa' failed)
        function encodeBase64Unicode(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        // 2. Hàm giải mã Base64 chứa Unicode (Dùng để đọc kết quả từ API gửi về)
        function decodeBase64Unicode(str) {
            if (!str) return "";
            return decodeURIComponent(escape(atob(str)));
        }

        async function runCode() {
            const outputDiv = document.getElementById('output');
            const code = document.getElementById('code').value;
            const langId = document.getElementById('language').value;

            outputDiv.innerHTML = "Đang biên dịch và chạy code...";
            outputDiv.className = 'output';

            try {
                // Mã hóa code chứa tiếng Việt an toàn trước khi gửi
                const sourceCodeBase64 = encodeBase64Unicode(code);

                /* ========================================================
                   GỌI API BIÊN DỊCH (VÍ DỤ VỚI JUDGE0 QUA RAPIDAPI)
                   Lưu ý: Bạn cần thay thế 'YOUR_RAPIDAPI_KEY' bằng API Key 
                   thực tế của bạn để request thành công.
                   ========================================================
                */
                const apiUrl = 'https://judge0-ce.p.rapidapi.com/submissions?base64_encoded=true&wait=true';
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-RapidAPI-Key': 'YOUR_RAPIDAPI_KEY', // <-- ĐIỀN API KEY CỦA BẠN VÀO ĐÂY
                        'X-RapidAPI-Host': 'judge0-ce.p.rapidapi.com'
                    },
                    body: JSON.stringify({
                        language_id: parseInt(langId),
                        source_code: sourceCodeBase64
                    })
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        throw new Error(`Lỗi xác thực (403/401): Bạn chưa điền API Key hoặc API Key không hợp lệ trong file mã nguồn.`);
                    }
                    throw new Error(`Lỗi HTTP: ${response.status}`);
                }

                const data = await response.json();

                // Xử lý kết quả trả về từ Judge0 (giải mã Base64 an toàn)
                if (data.compile_output) {
                    outputDiv.innerHTML = `<span class="error">Lỗi biên dịch:\n${decodeBase64Unicode(data.compile_output)}</span>`;
                } else if (data.stderr) {
                    outputDiv.innerHTML = `<span class="error">Lỗi thực thi:\n${decodeBase64Unicode(data.stderr)}</span>`;
                } else if (data.stdout) {
                    outputDiv.innerHTML = `<span class="success">${decodeBase64Unicode(data.stdout)}</span>`;
                } else {
                    outputDiv.innerHTML = "Chương trình kết thúc mà không in ra kết quả nào.";
                }

            } catch (error) {
                outputDiv.innerHTML = `<span class="error">Lỗi kết nối hệ thống: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
