<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZCompiler IDE</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        :root { --bg: #1e1e1e; --panel: #252526; --text: #cccccc; --accent: #007acc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        header { background: var(--panel); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .logo { font-weight: bold; color: #fff; font-size: 1.2em; }
        
        /* Main Layout */
        main { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        #editor-container, #output-container { flex: 1; display: flex; flex-direction: column; background: var(--panel); border-radius: 6px; overflow: hidden; }
        
        /* Editor & Output */
        textarea { flex: 1; background: transparent; color: #d4d4d4; border: none; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; }
        #output { flex: 1; padding: 15px; overflow-y: auto; white-space: pre-wrap; font-family: 'Consolas', monospace; color: #4ade80; }
        
        .title-bar { padding: 5px 15px; background: #333; font-size: 0.8em; color: #aaa; text-transform: uppercase; }
        
        /* Controls */
        button { padding: 8px 20px; background: var(--accent); border: none; color: white; cursor: pointer; border-radius: 3px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #005f9e; }
        select { padding: 7px; background: #3c3c3c; color: white; border: 1px solid #555; border-radius: 3px; }

        @media (max-width: 768px) { main { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <div class="logo">EZCompiler IDE</div>
    <div>
        <select id="lang">
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="python">Python</option>
            <option value="js">JavaScript</option>
        </select>
        <button onclick="runCode()">Chạy Code ▶</button>
    </div>
</header>

<main>
    <div id="editor-container">
        <div class="title-bar">Mã nguồn</div>
        <textarea id="code" spellcheck="false" placeholder="Viết code ở đây..."></textarea>
    </div>
    <div id="output-container">
        <div class="title-bar">Kết quả (Output)</div>
        <div id="output">Sẵn sàng!</div>
    </div>
</main>

<script>
    let pyodide = null;
    const output = document.getElementById('output');
    const templates = {
        'cpp': '#include <iostream>\n\nint main() {\n    std::cout << "hello";\n    return 0;\n}',
        'c': '#include <stdio.h>\n\nint main() {\n    printf("hello");\n    return 0;\n}',
        'python': 'print("hello")',
        'js': 'console.log("hello");'
    };

    // Update code khi đổi ngôn ngữ
    document.getElementById('lang').onchange = () => {
        document.getElementById('code').value = templates[document.getElementById('lang').value];
    };

    async function init() {
        pyodide = await loadPyodide();
        document.getElementById('code').value = templates['cpp'];
        output.innerText = "Trình biên dịch đã sẵn sàng.";
    }
    init();

    async function runCode() {
        const lang = document.getElementById('lang').value;
        const code = document.getElementById('code').value;
        output.innerText = "Đang xử lý...";

        try {
            if (lang === 'cpp' || lang === 'c') {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ compiler: 'gcc-head', code: code, save: false })
                });
                const data = await response.json();
                output.innerText = data.compiler_error || data.program_error || data.program_output || "Hoàn thành.";
            } else if (lang === 'python') {
                await pyodide.runPythonAsync(`import sys, io; sys.stdout = io.StringIO()`);
                await pyodide.runPythonAsync(code);
                output.innerText = await pyodide.runPythonAsync("sys.stdout.getvalue()");
                await pyodide.runPythonAsync("sys.stdout = sys.__stdout__");
            } else if (lang === 'js') {
                let logs = [];
                const oldLog = console.log;
                console.log = (...args) => logs.push(args.join(" "));
                try { eval(code); output.innerText = logs.length > 0 ? logs.join("\n") : "Đã thực thi thành công."; } 
                catch (e) { output.innerText = "Lỗi JS: " + e.message; }
                finally { console.log = oldLog; }
            }
        } catch (e) { output.innerText = "Lỗi hệ thống: " + e.message; }
    }
</script>
</body>
</html>
