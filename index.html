<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EZCompiler</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        textarea { width: 100%; height: 40%; background: #121212; color: #fff; padding: 10px; }
        #output { background: #090d16; color: #4ade80; padding: 10px; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; }
        button { padding: 10px; background: #00c853; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

<select id="lang">
    <option value="cpp">C++ (gcc-head)</option>
    <option value="c">C (gcc-head)</option>
    <option value="java">Java (openjdk-head)</option>
    <option value="python">Python (cpython-head)</option>
    <option value="js">JavaScript (nodejs-head)</option>
</select>
<button onclick="runCode()">Chạy Code</button>

<textarea id="code">
#include <iostream>
int main() { std::cout << "Hello World"; return 0; }
</textarea>

<div id="output">Kết quả sẽ hiện ở đây...</div>

<script>
    async function runCode() {
        const output = document.getElementById('output');
        const code = document.getElementById('code').value;
        const lang = document.getElementById('lang').value;
        
        // Mapping tối giản
        const compilerIds = {
            'cpp': 'gcc-head',
            'c': 'gcc-head',
            'java': 'openjdk-head',
            'python': 'cpython-head',
            'js': 'nodejs-head'
        };

        output.innerText = "Đang gửi request...";

        try {
            const response = await fetch('https://wandbox.org/api/compile.json', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    compiler: compilerIds[lang],
                    code: code,
                    // BỎ THAM SỐ "OPTIONS" ĐỂ TRÁNH GÂY LỖI SERVER
                    save: false 
                })
            });

            // Nếu server trả về 500, nó sẽ nhảy vào block catch hoặc trả về json lỗi
            const data = await response.json();
            console.log("Phản hồi từ server:", data); // QUAN TRỌNG: Mở F12 xem cái này

            if (data.compiler_error) output.innerText = "Lỗi: " + data.compiler_error;
            else if (data.program_output) output.innerText = data.program_output;
            else output.innerText = "Kết quả: " + JSON.stringify(data);

        } catch (e) {
            output.innerText = "Lỗi kết nối: " + e.message + "\nVui lòng kiểm tra Console (F12)";
        }
    }
</script>
</body>
</html>
