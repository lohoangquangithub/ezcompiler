<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EZCompiler Pro</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .controls { padding: 15px; background: #1a202c; display: flex; gap: 10px; }
        textarea { width: 100%; height: 40%; background: #121212; color: #fff; padding: 15px; border: none; font-family: monospace; }
        #output { background: #090d16; color: #4ade80; padding: 15px; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
        button { padding: 8px 20px; background: #00c853; border: none; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #00e676; }
    </style>
</head>
<body>

<div class="controls">
    <select id="lang">
        <option value="cpp">C++</option>
        <option value="c">C</option>
        <option value="python">Python</option>
        <option value="js">JavaScript</option>
    </select>
    <button onclick="runCode()">Chạy Code ▶</button>
</div>

<textarea id="code" spellcheck="false">#include <iostream>
int main() { std::cout << "Hello C++"; return 0; }</textarea>

<div id="output">Nhấn "Chạy Code" để bắt đầu...</div>

<script>
    let pyodide = null;
    const output = document.getElementById('output');

    // Khởi tạo Pyodide khi trang web vừa tải xong
    async function initPyodide() {
        output.innerText = "Đang tải Python engine...";
        pyodide = await loadPyodide();
        output.innerText = "Sẵn sàng!";
    }
    initPyodide();

    async function runCode() {
        const lang = document.getElementById('lang').value;
        const code = document.getElementById('code').value;
        output.innerText = "Đang chạy...";

        try {
            // 1. Logic cho C / C++ (Wandbox API)
            if (lang === 'cpp' || lang === 'c') {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        compiler: 'gcc-head',
                        code: code,
                        save: false
                    })
                });
                const data = await response.json();
                output.innerText = data.compiler_error || data.program_error || data.program_output || "Không có đầu ra.";
            } 
            
            // 2. Logic cho Python (Pyodide - Chạy local)
            else if (lang === 'python') {
                const result = await pyodide.runPythonAsync(code);
                output.innerText = result ?? "Python chạy xong (không có return).";
            }

            // 3. Logic cho JavaScript (Native)
            else if (lang === 'js') {
                let logs = [];
                const originalLog = console.log;
                console.log = (...args) => logs.push(args.join(" "));
                
                try {
                    eval(code);
                    output.innerText = logs.length > 0 ? logs.join("\n") : "JS chạy xong.";
                } catch (e) {
                    output.innerText = "Lỗi JS: " + e.message;
                } finally {
                    console.log = originalLog;
                }
            }
        } catch (e) {
            output.innerText = "Lỗi hệ thống: " + e.message;
        }
    }
</script>
</body>
</html>
