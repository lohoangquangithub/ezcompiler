<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EzCompiler Pro</title>
    <style>
        body { margin: 0; background: #0b0f19; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1a202c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2d3748; }
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .panel { flex: 1; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 5px; overflow: hidden; }
        textarea { flex: 1; background: #121212; color: #63b3ed; padding: 15px; border: none; outline: none; font-family: 'Consolas', monospace; font-size: 14px; resize: none; }
        iframe { flex: 1; background: white; border: none; }
        select { padding: 8px; background: #2d3748; color: white; border: 1px solid #4a5568; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h2>⚡ EzCompiler</h2>
    <div>
        <label>Chọn ngôn ngữ: </label>
        <select id="language" onchange="updateEditor()">
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="java">Java</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
        </select>
    </div>
</header>

<div class="main-container">
    <div class="panel">
        <textarea id="code" spellcheck="false"></textarea>
    </div>
    <div class="panel">
        <iframe id="compiler-frame" src="https://www.jdoodle.com/embed/v0/2IhG" title="Compiler"></iframe>
    </div>
</div>

<script>
    // 1. Dữ liệu các mẫu code (Templates)
    const templates = {
        'cpp': '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello C++";\n    return 0;\n}',
        'c': '#include <stdio.h>\n\nint main() {\n    printf("Hello C");\n    return 0;\n}',
        'java': 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello Java");\n    }\n}',
        'python': 'print("Hello Python")',
        'javascript': 'console.log("Hello JavaScript");'
    };

    // 2. Hàm tự động đổi code khi chọn ngôn ngữ
    function updateEditor() {
        const lang = document.getElementById('language').value;
        const editor = document.getElementById('code');
        editor.value = templates[lang];
        
        // Cập nhật hướng dẫn: Iframe của JDoodle hỗ trợ chạy code trực tiếp
        // Lưu ý: Đối với GitHub Pages, bạn chỉ cần để 1 iframe cố định 
        // vì các trang nhúng này đã hỗ trợ chọn ngôn ngữ bên trong rồi.
    }

    // Khởi tạo code mẫu khi load trang
    window.onload = function() {
        updateEditor();
    };
</script>

</body>
</html>
