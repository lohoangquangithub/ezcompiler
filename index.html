<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZCompiler - Piston Engine</title>
    <style>
        body { 
            margin: 0; 
            background: #0b0f19; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            background: #1a202c; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #2d3748; 
        }
        .logo { 
            font-size: 22px; 
            font-weight: bold; 
            color: #48bb78; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        .logo span { color: #fff; }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        label { font-size: 14px; color: #a0aec0; }
        select { 
            padding: 8px 12px; 
            background: #2d3748; 
            color: white; 
            border: 1px solid #4a5568; 
            border-radius: 4px; 
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        button { 
            padding: 8px 18px; 
            background: #00c853; 
            color: white; 
            border: none;
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s; 
        }
        button:hover { 
            background: #00e676; 
        }
        .main-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            padding: 15px; 
            gap: 15px; 
        }
        .panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #121212;
            border: 1px solid #2d3748; 
            border-radius: 6px; 
            overflow: hidden; 
        }
        .panel-header { 
            padding: 10px 15px; 
            background: #1a202c; 
            font-size: 12px; 
            color: #a0aec0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            border-bottom: 1px solid #2d3748;
        }
        textarea { 
            flex: 1; 
            background: #090d16; 
            color: #38bdf8; 
            padding: 15px; 
            border: none; 
            outline: none; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 14px; 
            resize: none; 
            line-height: 1.5;
        }
        #output { 
            flex: 1; 
            background: #090d16; 
            color: #4ade80; 
            padding: 15px; 
            overflow-y: auto; 
            white-space: pre-wrap; 
            font-family: 'Consolas', 'Courier New', monospace; 
            font-size: 14px; 
            line-height: 1.5;
        }
        .error-text {
            color: #f87171 !important;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">⚡ EZ<span>Compiler</span></div>
    <div class="controls">
        <label for="language">Ngôn ngữ:</label>
        <select id="language" onchange="updateEditor()">
            <option value="cpp">C++ (GCC)</option>
            <option value="c">C (GCC)</option>
            <option value="java">Java (OpenJDK)</option>
            <option value="python">Python 3</option>
            <option value="javascript">JavaScript (Node.js)</option>
        </select>
        <button onclick="runCode()">Chạy Code ▶</button>
    </div>
</header>

<div class="main-container">
    <div class="panel">
        <div class="panel-header">TRÌNH SOẠN THẢO MÃ NGUỒN</div>
        <textarea id="code" spellcheck="false"></textarea>
    </div>
    <div class="panel">
        <div class="panel-header">KẾT QUẢ (OUTPUT)</div>
        <div id="output">Nhấn "Chạy Code ▶" để xem kết quả thực thi...</div>
    </div>
</div>

<script>
    // 1. Danh sách mã nguồn mẫu tương ứng từng ngôn ngữ
    const templates = {
        'cpp': '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Xin chào từ EZCompiler!" << endl;\n    int a = 5, b = 10;\n    cout << "Tong la: " << a + b << endl;\n    return 0;\n}',
        'c': '#include <stdio.h>\n\nint main() {\n    printf("Xin chào từ EZCompiler!\\n");\n    int a = 5, b = 10;\n    printf("Tong la: %d\\n", a + b);\n    return 0;\n}',
        'java': 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Xin chào từ EZCompiler!");\n        int a = 5, b = 10;\n        System.out.println("Tong la: " + (a + b));\n    }\n}',
        'python': 'print("Xin chào từ EZCompiler!")\na = 5\nb = 10\nprint(f"Tong la: {a + b}")',
        'javascript': 'console.log("Xin chào từ EZCompiler!");\nlet a = 5, b = 10;\nconsole.log("Tong la:", a + b);'
    };

    // 2. Hàm tự động đổi code khi thay đổi menu ngôn ngữ
    function updateEditor() {
        const lang = document.getElementById('language').value;
        document.getElementById('code').value = templates[lang];
        // Reset trạng thái ô output về ban đầu
        document.getElementById('output').classList.remove('error-text');
        document.getElementById('output').innerText = 'Nhấn "Chạy Code ▶" để xem kết quả thực thi...';
    }

    // 3. Hàm gọi API Piston xử lý biên dịch và hiển thị kết quả
    async function runCode() {
        const outputDiv = document.getElementById('output');
        const codeText = document.getElementById('code').value;
        const langValue = document.getElementById('language').value;

        outputDiv.classList.remove('error-text');
        outputDiv.innerText = "Đang kết nối tới máy chủ biên dịch...";

        try {
            const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    language: langValue,
                    version: "*", // Tự động lấy phiên bản mới nhất có sẵn trên hệ thống Piston
                    files: [{ content: codeText }]
                })
            });

            const data = await response.json();

            if (data.run) {
                // Trường hợp có lỗi cú pháp hoặc lỗi runtime (stderr)
                if (data.run.stderr) {
                    outputDiv.classList.add('error-text');
                    outputDiv.innerText = data.run.stderr;
                } 
                // Trường hợp chạy thành công xuất ra kết quả chuẩn (stdout)
                else if (data.run.stdout) {
                    outputDiv.innerText = data.run.stdout;
                } 
                // Mã chạy thành công hoàn toàn nhưng bản thân mã không ra lệnh in/xuất dữ liệu gì
                else {
                    outputDiv.innerText = "Chương trình đã thực thi thành công (Mã trả về: " + data.run.code + ") nhưng không có dữ liệu output.";
                }
            } else {
                outputDiv.classList.add('error-text');
                outputDiv.innerText = "Lỗi phản hồi hệ thống: Không thể đọc cấu trúc dữ liệu từ máy chủ.";
            }
        } catch (error) {
            outputDiv.classList.add('error-text');
            outputDiv.innerText = "Lỗi kết nối mạng: Không thể gửi yêu cầu đến Piston API.\nChi tiết: " + error.message;
        }
    }

    // Tự động nạp mã C++ mẫu ngay khi trang web vừa tải xong
    window.onload = updateEditor;
</script>

</body>
</html>
