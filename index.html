<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EzCompiler - Piston Edition</title>
    <style>
        body { margin: 0; background: #0b0f19; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1a202c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2d3748; }
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        .panel { flex: 1; display: flex; flex-direction: column; border: 1px solid #333; border-radius: 5px; overflow: hidden; }
        .panel-header { padding: 10px; background: #2d3748; font-size: 12px; color: #a0aec0; text-transform: uppercase; }
        textarea { flex: 1; background: #121212; color: #63b3ed; padding: 15px; border: none; outline: none; font-family: 'Consolas', monospace; font-size: 14px; resize: none; }
        #output { flex: 1; background: #121212; color: #48bb78; padding: 15px; overflow-y: auto; white-space: pre-wrap; font-family: 'Consolas', monospace; }
        select, button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        button { background: #00c853; color: white; transition: 0.2s; }
        button:hover { background: #00e676; }
    </style>
</head>
<body>

<header>
    <h2>⚡ EzCompiler (Piston API)</h2>
    <div>
        <select id="language" onchange="updateEditor()">
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="java">Java</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
        </select>
        <button onclick="runCode()">Chạy Code ▶</button>
    </div>
</header>

<div class="main-container">
    <div class="panel">
        <div class="panel-header">Trình soạn thảo</div>
        <textarea id="code" spellcheck="false"></textarea>
    </div>
    <div class="panel">
        <div class="panel-header">Kết quả Output</div>
        <div id="output">Nhấn "Chạy Code" để bắt đầu...</div>
    </div>
</div>

<script>
    // 1. Template code
    const templates = {
        'cpp': '#include <iostream>\nusing namespace std;\nint main() {\n    cout << "Hello C++";\n    return 0;\n}',
        'c': '#include <stdio.h>\nint main() {\n    printf("Hello C");\n    return 0;\n}',
        'java': 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello Java");\n    }\n}',
        'python': 'print("Hello Python")',
        'javascript': 'console.log("Hello JavaScript");'
    };

    function updateEditor() {
        document.getElementById('code').value = templates[document.getElementById('language').value];
    }

    // 2. Gọi Piston API
    async function runCode() {
        const output = document.getElementById('output');
        const code = document.getElementById('code').value;
        const lang = document.getElementById('language').value;

        output.innerText = "Đang biên dịch...";

        try {
            const response = await fetch('https://emkc.org/api/v2/piston/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    language: lang,
                    version: "*", // Sử dụng phiên bản mới nhất
                    files: [{ content: code }]
                })
            });

            const data = await response.json();

            if (data.run && data.run.output) {
                output.innerText = data.run.output;
            } else if (data.run && data.run.stderr) {
                output.innerText = "Lỗi: " + data.run.stderr;
            } else {
                output.innerText = "Không có kết quả trả về.";
            }
        } catch (error) {
            output.innerText = "Lỗi kết nối tới Piston API: " + error.message;
        }
    }

    // Khởi tạo
    window.onload = updateEditor;
</script>

</body>
</html>
