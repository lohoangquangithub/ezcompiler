<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OneCompiler Clone</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="window">

<!-- ================= TOP BAR ================= -->

<header class="topbar">

<div class="logo">

<i class="fa-solid fa-code"></i>

<span>OneCompiler Clone</span>

</div>

<div class="toolbar">

<button id="newFile">
<i class="fa-solid fa-file"></i>
New
</button>

<button id="openProject">
<i class="fa-solid fa-folder-open"></i>
Open
</button>

<button id="saveProject">
<i class="fa-solid fa-floppy-disk"></i>
Save
</button>

<button id="downloadProject">
<i class="fa-solid fa-download"></i>
Download
</button>

<button id="uploadProject">
<i class="fa-solid fa-upload"></i>
Upload
</button>

<button class="run" id="runBtn">
<i class="fa-solid fa-play"></i>
Run
</button>

</div>

<div class="account">

<i class="fa-solid fa-user"></i>

</div>

</header>

<!-- ================= MAIN ================= -->

<div class="main">

<!-- LEFT -->

<aside class="sidebar">

<div class="sidebar-title">

Explorer

</div>

<div class="project-name">

PROJECT

</div>

<ul id="fileTree">

<li class="folder">

<i class="fa-solid fa-folder-open"></i>

project

<ul>

<li class="file active" data-file="index.html">

<i class="fa-brands fa-html5"></i>

index.html

</li>

<li class="file" data-file="style.css">

<i class="fa-brands fa-css3-alt"></i>

style.css

</li>

<li class="file" data-file="script.js">

<i class="fa-brands fa-js"></i>

script.js

</li>

</ul>

</li>

</ul>

</aside>

<!-- CENTER -->

<section class="workspace">

<!-- Tabs -->

<div class="tabs">

<div class="tab active">

index.html

<span>x</span>

</div>

</div>

<!-- Editor -->

<div id="editor">

<textarea id="code">

<!DOCTYPE html>

<html>

<head>

<title>Hello</title>

</head>

<body>

<h1>Hello World</h1>

</body>

</html>

</textarea>

</div>

</section>

<!-- RIGHT -->

<aside class="previewPanel">

<div class="previewTitle">

Preview

</div>

<iframe id="preview"></iframe>

</aside>

</div>

<!-- ================= BOTTOM ================= -->

<footer class="console">

<div class="console-header">

Console

<button id="clearConsole">

Clear

</button>

</div>

<pre id="consoleOutput">

Ready.

</pre>

</footer>

</div>

<input type="file"

id="uploadInput"

hidden>

<script src="script.js"></script>

</body>

</html>
