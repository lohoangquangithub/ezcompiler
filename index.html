<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>EZCompiler Hybrid</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .controls { padding: 10px; background: #1a202c; }
        textarea { width: 100%; height: 40%; background: #121212; color: #fff; padding: 10px; border: none; }
        #output { background: #090d16; color: #4ade80; padding: 10px; flex-grow: 1; overflow-y: auto; white-space: pre-wrap; border-top: 1px solid #333; }
        button { padding: 10px 20px; background: #00c853; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="controls">
    <select id="lang">
        <option value="cpp">C++</option>
        <option value="c">C</option>
        <option value="java">Java</option>
        <option value="python">Python 3</option>
        <option value="js">JavaScript</option>
    </select>
    <button onclick="runCode()">Chạy Code</button>
</div>

<textarea id="code">#include <iostream>
using namespace std;
int main() { cout << "Hello World!"; return 0; }</textarea>

<div id="output">Kết quả sẽ hiện ở đây...</div>

<script>
    async function runCode() {
        const lang = document.getElementById('lang').value;
        const code = document.getElementById('code').value;
        const output = document.getElementById('output');
        
        output.innerText = "Đang xử lý...";

        // CẤU HÌNH API Ở ĐÂY
        // Nếu bạn muốn dùng Piston cho C/C++ (cái cũ), hãy sửa lại endpoint và payload tương ứng
        // Hiện tại đang cấu hình mặc định dùng Wandbox cho mọi ngôn ngữ
        
        const isCpp = (lang === 'cpp' || lang === 'c');
        
        try {
            // Đây là logic gọi API
            const response = await fetch('https://wandbox.org/api/compile.json', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    compiler: isCpp ? 'gcc-head' : (lang === 'java' ? 'openjdk-head' : (lang === 'python' ? 'cpython-head' : 'nodejs-head')),
                    code: code,
                    save: false
                })
            });

            const data = await response.json();

            if (data.compiler_error || data.program_error) {
                output.innerText = "Lỗi: " + (data.compiler_error || data.program_error);
            } else {
                output.innerText = data.program_output || "Chương trình thực thi thành công.";
            }
        } catch (e) {
            output.innerText = "Lỗi kết nối: " + e.message;
        }
    }
</script>
</body>
</html>
