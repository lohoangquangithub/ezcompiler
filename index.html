<script>
    const templates = {
        cpp: `#include <iostream>\n\nint main() {\n    std::cout << "Hello C++!" << std::endl;\n    return 0;\n}`,
        c: `#include <stdio.h>\n\nint main() {\n    printf("Hello C!\\n");\n    return 0;\n}`,
        python: `print("Hello Python!")`,
        javascript: `console.log("Hello JS!");`
    };

    const modes = { cpp: "text/x-c++src", c: "text/x-csrc", python: "python", javascript: "javascript" };

    // --- BƯỚC 1: ĐỌC DỮ LIỆU NGAY LẬP TỨC ---
    const savedLang = localStorage.getItem('lang') || 'cpp';
    const savedCode = localStorage.getItem('code') || templates['cpp'];

    // --- BƯỚC 2: CẬP NHẬT UI TRƯỚC KHI EDITOR KHỞI TẠO ---
    const langSelect = document.getElementById('lang');
    langSelect.value = savedLang; 

    // --- BƯỚC 3: KHỞI TẠO EDITOR VỚI DỮ LIỆU ĐÃ ĐỌC ---
    let editor = CodeMirror(document.getElementById("editor"), {
        value: savedCode, // Load chính xác cái này
        mode: modes[savedLang],
        theme: "monokai",
        lineNumbers: true
    });

    // --- BƯỚC 4: CÁC HÀM XỬ LÝ ---

    // Hàm đổi ngôn ngữ (Chỉ chạy khi người dùng chọn thủ công)
    function onLangChange() {
        const lang = langSelect.value;
        
        // 1. Ghi đè template mới (Người dùng chủ động đổi thì mới đè)
        editor.setValue(templates[lang]);
        
        // 2. Cập nhật mode
        editor.setOption("mode", modes[lang]);
        
        // 3. Lưu vào storage
        localStorage.setItem('lang', lang);
        localStorage.setItem('code', templates[lang]);
    }

    // Auto-save khi gõ (Chỉ lưu code, không đổi ngôn ngữ, không đè template)
    editor.on('change', () => {
        localStorage.setItem('code', editor.getValue());
    });

    // Các hàm khác giữ nguyên...
    async function init() { /* load pyodide ... */ }
    init();
    async function runCode() { /* ... */ }
</script>
