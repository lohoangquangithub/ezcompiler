<script>
    const templates = {
        cpp: `#include <iostream>\n\nint main() {\n    std::cout << "Hello C++!" << std::endl;\n    return 0;\n}`,
        c: `#include <stdio.h>\n\nint main() {\n    printf("Hello C!\\n");\n    return 0;\n}`,
        python: `print("Hello Python!")`,
        javascript: `console.log("Hello JS!");`
    };

    const modes = { cpp: "text/x-c++src", c: "text/x-csrc", python: "python", javascript: "javascript" };

    // --- LOGIC RESET CỨNG ---
    // Chúng ta không đọc từ localStorage nữa. 
    // Mọi biến khởi tạo đều được set cứng về C++
    const defaultLang = 'cpp';
    const defaultCode = templates['cpp'];

    // 1. Set giá trị cho select box mặc định là C++
    document.getElementById('lang').value = defaultLang;

    // 2. Khởi tạo Editor luôn luôn là C++
    let editor = CodeMirror(document.getElementById("editor-container"), {
        value: defaultCode,
        mode: modes[defaultLang],
        theme: "monokai",
        lineNumbers: true
    });

    // 3. Logic đổi ngôn ngữ (Vẫn giữ để bạn chọn sang ngôn ngữ khác khi đang làm việc)
    // Nhưng vì không load lại localStorage, nên chỉ cần F5 là mọi thứ quay về đầu.
    document.getElementById('lang').addEventListener('change', function() {
        const lang = this.value;
        editor.setOption("mode", modes[lang]);
        editor.setValue(templates[lang]);
    });

    // LƯU Ý: Tôi đã bỏ đoạn editor.on('change') ghi vào localStorage 
    // để đảm bảo tính chất "reset sạch sẽ" hoàn toàn.
    
    async function runCode() { /* ... logic của bạn ... */ }
</script>
